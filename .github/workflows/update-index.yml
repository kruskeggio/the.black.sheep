name: Aggiorna Homepage
on:
  push:
    paths:
      - 'articoli/**.html'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install beautifulsoup4

      - name: Genera index.html e feed.xml
        run: python scripts/build_index.py

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add index.html feed.xml
          git diff --staged --quiet || git commit -m "Auto: aggiorna homepage e feed"
          git push